<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RR Automation Service</title>
  <style>
    body { font-family: Segoe UI, Roboto, sans-serif; width: 280px; padding: 14px; }
    h3 { margin: 0 0 10px; color: #00acd6; font-size: 15px; }
    button {
      background: #00c0ef; border: 1px solid #00acd6; color: #fff;
      padding: 10px 12px; border-radius: 4px; cursor: pointer; width: 100%;
      font-size: 13px; font-weight: 500; text-align: left;
    }
    button:hover { background: #00acd6; }
    button.secondary { background: #fff; color: #00acd6; font-weight: 400; font-size: 12px; text-align: center; padding: 6px 8px; }
    .row { margin-top: 8px; }
    .sub { font-size: 11px; color:#888; margin-top:2px; padding-left:2px; }
    .status { margin-top: 10px; font-size: 12px; color: #555; min-height: 16px; }
    .pbar { margin-top: 6px; height: 6px; background:#eef2f5; border-radius:4px; overflow:hidden; border: 1px solid #dde2e7; }
    .pbar > div { height: 100%; width: 0; background: linear-gradient(90deg,#00c0ef,#00acd6); transition: width .3s ease; }
    .pbar.ok > div { background: linear-gradient(90deg,#28a745,#1d8a39); }
    .pbar.error > div { background: linear-gradient(90deg,#dc3545,#b02635); }
    hr { border:none; border-top:1px solid #eee; margin:10px 0; }
    a { color: #00acd6; font-size: 12px; }
  </style>
</head>
<body>
  <h3>RR Automation Service</h3>

  <div class="row">
    <button data-flow="online_payment_report">▶ Start Automation</button>
    <div class="sub">Online Payment Report → Today Servicing</div>
  </div>

  <hr />

  <div class="row"><button id="view" class="secondary">View Last Result</button></div>
  <div class="row"><button id="details" class="secondary">Open Extension Details (enable file URLs)</button></div>
  <div class="row"><a href="#" id="options">⚙ Set Credentials</a></div>
  <div class="status" id="status"></div>
  <div class="pbar" id="pbar"><div id="pbar-fill"></div></div>
  <script src="popup.js"></script>
</body>
</html>
