<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>RR Automation Service</title>
  <style>
    body { font-family: Segoe UI, Roboto, sans-serif; width: 300px; padding: 12px; }
    h3 { margin: 0 0 8px; color: #00acd6; }
    button {
      background: #00c0ef; border: 1px solid #00acd6; color: #fff;
      padding: 8px 12px; border-radius: 3px; cursor: pointer; width: 100%;
      font-size: 14px;
    }
    button.secondary { background: #fff; color: #00acd6; }
    .row { margin-top: 8px; }
    .status { margin-top: 10px; font-size: 12px; color: #555; min-height: 16px; }
    .pbar {
      margin-top: 8px; height: 8px; background:#eef2f5; border-radius:4px; overflow:hidden;
      border: 1px solid #dde2e7;
    }
    .pbar > div {
      height: 100%; width: 0; background: linear-gradient(90deg,#00c0ef,#00acd6);
      transition: width .4s ease; border-radius:4px;
    }
    .pbar.ok > div { background: linear-gradient(90deg,#28a745,#1d8a39); }
    .pbar.error > div { background: linear-gradient(90deg,#dc3545,#b02635); }
    a { color: #00acd6; font-size: 12px; }
  </style>
</head>
<body>
  <h3>RR Automation Service</h3>
  <div class="row"><button id="start">Start Automation</button></div>
  <div class="row"><button id="view" class="secondary">View Last Result</button></div>
  <div class="row"><button id="details" class="secondary">Open Extension Details (enable file URLs)</button></div>
  <div class="row"><a href="#" id="options">⚙️ Set Credentials</a></div>
  <div class="status" id="status"></div>
  <div class="pbar" id="pbar"><div id="pbar-fill"></div></div>
  <script src="popup.js"></script>
</body>
</html>
